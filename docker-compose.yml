services:
  postgres:
    image: postgres:16-alpine
    container_name: macro-postgres
    restart: unless-stopped
    networks:
      - macro-internal
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-macro_analyzer}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-macro_analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: macro-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - macro-internal
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-macro_analyzer}
      FRED_API_KEY: ${FRED_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      SCHEDULER_HOUR: ${SCHEDULER_HOUR:-6}
      SCHEDULER_MINUTE: ${SCHEDULER_MINUTE:-0}
      TZ: ${TZ:-UTC}
    volumes:
      - fred-cache:/app/backend/.cache/fred
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: macro-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - macro-internal
      - traefik-net
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-net}"

      # Unico router su HTTPS. Il redirect HTTP→HTTPS è gestito globalmente
      # dall'entrypoint "web" del tuo Traefik (redirections.entrypoint.to=websecure).
      - "traefik.http.routers.macro.rule=Host(`${APP_DOMAIN:-macro.pieranlab.cloud}`)"
      - "traefik.http.routers.macro.entrypoints=websecure"
      - "traefik.http.routers.macro.tls=true"
      - "traefik.http.routers.macro.tls.certresolver=letsencrypt"
      - "traefik.http.routers.macro.service=macro"

      # Service: Traefik inoltra verso la porta 80 del container nginx
      - "traefik.http.services.macro.loadbalancer.server.port=80"

volumes:
  pgdata:
  fred-cache:

networks:
  macro-internal:
    driver: bridge
  traefik-net:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-net}
